<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>迷你角斗士</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f2e8;
      --muted: #c9c1b2;
      --gold: #f1bf5b;
      --red: #e65a54;
      --green: #65cf92;
      --blue: #6ba9ff;
      --panel: rgba(22, 24, 28, .76);
      --line: rgba(255, 255, 255, .14);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #101216;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
    }

    body {
      position: fixed;
      inset: 0;
    }

    .game {
      position: relative;
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at 50% 42%, rgba(241, 191, 91, .18), transparent 33vw),
        linear-gradient(180deg, #181b23 0%, #111318 100%);
      overflow: hidden;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .hud {
      position: absolute;
      top: max(10px, env(safe-area-inset-top));
      left: max(12px, env(safe-area-inset-left));
      right: max(12px, env(safe-area-inset-right));
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: start;
      pointer-events: none;
      z-index: 3;
    }

    .fighter-panel {
      min-width: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(14px);
      border-radius: 8px;
      padding: 8px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, .25);
    }

    .fighter-panel.right {
      text-align: right;
    }

    .name-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: clamp(11px, 1.4vw, 14px);
      font-weight: 900;
      white-space: nowrap;
    }

    .right .name-row {
      flex-direction: row-reverse;
    }

    .health {
      height: 15px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, .18);
      overflow: hidden;
      background: rgba(0, 0, 0, .35);
    }

    .health-fill {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #db4742, #f1985f, #68cf91);
      transition: width .18s ease;
    }

    .rounds {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 8px 12px;
      backdrop-filter: blur(14px);
      box-shadow: 0 14px 34px rgba(0, 0, 0, .25);
      min-width: 142px;
    }

    .score-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, .22);
      background: rgba(255, 255, 255, .08);
    }

    .score-dot.on {
      background: var(--gold);
      box-shadow: 0 0 16px rgba(241, 191, 91, .42);
    }

    .round-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
    }

    .controls {
      position: absolute;
      inset: auto max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      height: 34vh;
      min-height: 148px;
      pointer-events: none;
      z-index: 4;
    }

    .stick {
      position: absolute;
      left: 0;
      bottom: 0;
      width: min(28vw, 168px);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, .16);
      background: radial-gradient(circle, rgba(255, 255, 255, .10), rgba(255, 255, 255, .045));
      box-shadow: inset 0 0 28px rgba(255, 255, 255, .05), 0 18px 40px rgba(0, 0, 0, .28);
      pointer-events: auto;
    }

    .knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 42%;
      aspect-ratio: 1;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(180deg, rgba(255, 255, 255, .92), rgba(210, 218, 229, .74));
      border: 2px solid rgba(255, 255, 255, .36);
      box-shadow: 0 10px 24px rgba(0, 0, 0, .3);
    }

    .attack-pad {
      position: absolute;
      right: 0;
      bottom: 2px;
      width: min(26vw, 154px);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, .18);
      background:
        radial-gradient(circle at 38% 30%, rgba(255, 255, 255, .26), transparent 24%),
        linear-gradient(160deg, rgba(230, 90, 84, .95), rgba(241, 191, 91, .88));
      color: #191816;
      display: grid;
      place-items: center;
      font-size: clamp(34px, 8vw, 58px);
      font-weight: 950;
      pointer-events: auto;
      box-shadow: 0 20px 46px rgba(0, 0, 0, .34);
    }

    .attack-pad:active,
    .attack-pad.pressed {
      transform: scale(.96);
      filter: brightness(1.08);
    }

    .attack-pad span {
      transform: rotate(-18deg);
      display: block;
      text-shadow: 0 2px 0 rgba(255, 255, 255, .18);
    }

    .message {
      position: absolute;
      left: 50%;
      top: 48%;
      transform: translate(-50%, -50%);
      width: min(520px, calc(100vw - 40px));
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(17, 19, 24, .84);
      backdrop-filter: blur(16px);
      padding: 18px;
      text-align: center;
      box-shadow: 0 22px 55px rgba(0, 0, 0, .38);
      z-index: 5;
    }

    .message.hide {
      display: none;
    }

    .message h1 {
      margin: 0 0 8px;
      font-size: clamp(25px, 4vw, 42px);
      letter-spacing: 0;
    }

    .message p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.45;
      font-size: clamp(13px, 1.8vw, 16px);
    }

    .message button {
      min-width: 142px;
      min-height: 44px;
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(101, 207, 146, .95), rgba(62, 150, 103, .95));
      color: #101413;
      font-weight: 950;
      cursor: pointer;
    }

    .tips {
      position: absolute;
      top: calc(max(10px, env(safe-area-inset-top)) + 66px);
      left: 50%;
      transform: translateX(-50%);
      max-width: min(640px, 70vw);
      color: rgba(247, 242, 232, .72);
      font-size: clamp(11px, 1.4vw, 13px);
      font-weight: 750;
      text-align: center;
      pointer-events: none;
      z-index: 2;
      text-shadow: 0 2px 8px rgba(0, 0, 0, .5);
    }

    .rotate {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9;
      background: #101216;
      place-items: center;
      padding: 24px;
      text-align: center;
    }

    .rotate div {
      max-width: 330px;
      color: var(--muted);
      line-height: 1.5;
      font-weight: 800;
    }

    @media (orientation: portrait) and (max-width: 900px) {
      .rotate {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <main class="game">
    <canvas id="gameCanvas"></canvas>

    <section class="hud">
      <div class="fighter-panel">
        <div class="name-row">
          <span>影刃刺客</span>
          <span id="playerHpText">100%</span>
        </div>
        <div class="health"><div class="health-fill" id="playerHp"></div></div>
      </div>

      <div class="rounds">
        <span class="score-dot" id="playerWin1"></span>
        <span class="score-dot" id="playerWin2"></span>
        <span class="round-label" id="roundLabel">第 1 局</span>
        <span class="score-dot" id="enemyWin1"></span>
        <span class="score-dot" id="enemyWin2"></span>
      </div>

      <div class="fighter-panel right">
        <div class="name-row">
          <span>圣盔骑士</span>
          <span id="enemyHpText">100%</span>
        </div>
        <div class="health"><div class="health-fill" id="enemyHp"></div></div>
      </div>
    </section>

    <div class="tips" id="tips">三局两胜 · Q 版中世纪决斗</div>

    <section class="controls">
      <div class="stick" id="stick" aria-label="移动摇杆">
        <div class="knob" id="knob"></div>
      </div>
      <button class="attack-pad" id="attackBtn" aria-label="普通攻击"><span>🗡️</span></button>
    </section>

    <section class="message" id="message">
      <h1>迷你角斗士</h1>
      <p>横屏决斗，三局两胜。影刃刺客对圣盔骑士。</p>
      <button id="startBtn">开始决斗</button>
    </section>

    <section class="rotate">
      <div>请把手机横过来玩。这个版本按抖音小游戏的横屏手感设计。</div>
    </section>
  </main>

  <script>
    const canvas = document.querySelector("#gameCanvas");
    const ctx = canvas.getContext("2d");
    const els = {
      playerHp: document.querySelector("#playerHp"),
      enemyHp: document.querySelector("#enemyHp"),
      playerHpText: document.querySelector("#playerHpText"),
      enemyHpText: document.querySelector("#enemyHpText"),
      roundLabel: document.querySelector("#roundLabel"),
      message: document.querySelector("#message"),
      startBtn: document.querySelector("#startBtn"),
      attackBtn: document.querySelector("#attackBtn"),
      stick: document.querySelector("#stick"),
      knob: document.querySelector("#knob"),
      tips: document.querySelector("#tips"),
      playerWins: [document.querySelector("#playerWin1"), document.querySelector("#playerWin2")],
      enemyWins: [document.querySelector("#enemyWin1"), document.querySelector("#enemyWin2")]
    };

    const hitTable = [
      { part: "head", label: "头部", damage: 50 },
      { part: "neck", label: "脖子", damage: 25 },
      { part: "upper", label: "上身", damage: 15 },
      { part: "belly", label: "腹部", damage: 10 },
      { part: "limb", label: "手脚", damage: 5 }
    ];

    let W = 0;
    let H = 0;
    let dpr = 1;
    let lastTime = 0;
    let game;
    let stickPointer = null;
    const input = { x: 0, y: 0, attacking: false };

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      canvas.style.width = `${W}px`;
      canvas.style.height = `${H}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      if (game) resetPositions();
    }

    function makeGame() {
      return {
        mode: "menu",
        round: 1,
        playerScore: 0,
        enemyScore: 0,
        messageTimer: 0,
        toast: "",
        toastTimer: 0,
        particles: [],
        player: fighter("assassin", 0),
        enemy: fighter("knight", 1)
      };
    }

    function fighter(kind, side) {
      return {
        kind,
        side,
        x: side === 0 ? W * .28 : W * .72,
        y: H * .64,
        vx: 0,
        vy: 0,
        dir: side === 0 ? 1 : -1,
        hp: 100,
        neckHits: 0,
        attack: 0,
        cooldown: 0,
        hurt: 0,
        step: 0,
        aiThink: 0,
        aiMove: 0,
        aiBack: false
      };
    }

    function resetPositions() {
      game.player.x = W * .28;
      game.player.y = H * .65;
      game.enemy.x = W * .72;
      game.enemy.y = H * .65;
      game.player.dir = 1;
      game.enemy.dir = -1;
    }

    function startMatch() {
      game = makeGame();
      game.mode = "playing";
      els.message.classList.add("hide");
      els.tips.style.display = "none";
      startRound();
    }

    function startRound() {
      const pScore = game.playerScore;
      const eScore = game.enemyScore;
      const round = game.round;
      game.player = fighter("assassin", 0);
      game.enemy = fighter("knight", 1);
      game.playerScore = pScore;
      game.enemyScore = eScore;
      game.round = round;
      game.mode = "playing";
      resetPositions();
      showToast(`第 ${game.round} 局`);
      updateHud();
    }

    function showToast(text) {
      game.toast = text;
      game.toastTimer = 1.25;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function update(dt) {
      if (!game) return;
      game.particles = game.particles.filter(p => (p.life -= dt) > 0);
      game.particles.forEach(p => {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 320 * dt;
      });
      if (game.toastTimer > 0) game.toastTimer -= dt;

      if (game.mode !== "playing") {
        draw();
        return;
      }

      updatePlayer(dt);
      updateEnemy(dt);
      updateFighter(game.player, dt);
      updateFighter(game.enemy, dt);
      tryHit(game.player, game.enemy);
      tryHit(game.enemy, game.player);
      updateHud();
      draw();
    }

    function updatePlayer(dt) {
      const f = game.player;
      const speed = 230;
      f.vx = input.x * speed;
      f.vy = input.y * speed * .52;
      if (Math.abs(input.x) > .08) f.dir = input.x > 0 ? 1 : -1;
    }

    function updateEnemy(dt) {
      const ai = game.enemy;
      const player = game.player;
      const dist = player.x - ai.x;
      ai.dir = dist >= 0 ? 1 : -1;
      ai.aiThink -= dt;
      if (ai.aiThink <= 0) {
        ai.aiThink = .35 + Math.random() * .35;
        ai.aiBack = Math.abs(dist) < 78 && Math.random() < .3;
        ai.aiMove = Math.abs(dist) > 98 ? Math.sign(dist) : (ai.aiBack ? -Math.sign(dist) : 0);
        if (Math.abs(dist) < 132 && Math.abs(player.y - ai.y) < 74 && Math.random() < .72) {
          startAttack(ai);
        }
      }
      ai.vx = ai.aiMove * 185;
      const lane = player.y + (Math.random() - .5) * 32;
      ai.vy = clamp(lane - ai.y, -70, 70);
    }

    function updateFighter(f, dt) {
      const arena = arenaBounds();
      f.x = clamp(f.x + f.vx * dt, arena.left, arena.right);
      f.y = clamp(f.y + f.vy * dt, arena.top, arena.bottom);
      f.step += Math.abs(f.vx) * dt * .02;
      f.cooldown = Math.max(0, f.cooldown - dt);
      f.attack = Math.max(0, f.attack - dt);
      f.hurt = Math.max(0, f.hurt - dt);
    }

    function startAttack(f) {
      if (game.mode !== "playing" || f.cooldown > 0) return;
      f.attack = .28;
      f.cooldown = .58;
    }

    function tryHit(attacker, defender) {
      if (attacker.attack <= 0 || attacker.attack > .16 || attacker.didHit) return;
      attacker.didHit = true;
      setTimeout(() => { attacker.didHit = false; }, 220);

      const reach = attacker.kind === "knight" ? 112 : 104;
      const tip = {
        x: attacker.x + attacker.dir * reach,
        y: attacker.y - 88 + Math.sin(attacker.step) * 8
      };
      const boxes = bodyBoxes(defender);
      const hit = boxes.find(box =>
        tip.x >= box.x && tip.x <= box.x + box.w &&
        tip.y >= box.y && tip.y <= box.y + box.h
      );
      if (!hit) return;

      defender.hp = Math.max(0, defender.hp - hit.damage);
      defender.hurt = .28;
      if (hit.part === "neck") {
        defender.neckHits += 1;
        if (defender.neckHits >= 3) {
          defender.hp = 0;
          burst(defender.x, defender.y - 138, "#f1bf5b", 18);
          showToast(`${nameOf(attacker)} 三次命中脖子，直接击倒！`);
        }
      }

      burst(tip.x, tip.y, hit.part === "head" ? "#f1bf5b" : "#f7f2e8", 9);
      showToast(`${nameOf(attacker)} 命中${hit.label} -${hit.damage}%`);
      if (defender.hp <= 0) finishRound(attacker.side === 0 ? "player" : "enemy");
    }

    function finishRound(winner) {
      if (game.mode !== "playing") return;
      game.mode = "roundEnd";
      if (winner === "player") game.playerScore += 1;
      else game.enemyScore += 1;
      updateHud();

      if (game.playerScore >= 2 || game.enemyScore >= 2) {
        const won = game.playerScore > game.enemyScore;
        window.setTimeout(() => endMatch(won), 900);
        return;
      }

      game.round += 1;
      window.setTimeout(startRound, 1050);
    }

    function endMatch(won) {
      game.mode = "done";
      els.message.classList.remove("hide");
      els.tips.style.display = "";
      els.message.querySelector("h1").textContent = won ? "刺客胜利" : "骑士胜利";
      els.message.querySelector("p").textContent = `比分 ${game.playerScore}:${game.enemyScore}。再来一场，练一下走位和出剑距离。`;
      els.startBtn.textContent = "再来一局";
    }

    function arenaBounds() {
      return {
        left: W * .12,
        right: W * .88,
        top: H * .48,
        bottom: H * .82
      };
    }

    function bodyBoxes(f) {
      const scale = scaleOf();
      const x = f.x;
      const y = f.y;
      return [
        { part: "head", label: "头部", damage: 50, x: x - 23 * scale, y: y - 164 * scale, w: 46 * scale, h: 38 * scale },
        { part: "neck", label: "脖子", damage: 25, x: x - 14 * scale, y: y - 126 * scale, w: 28 * scale, h: 18 * scale },
        { part: "upper", label: "上身", damage: 15, x: x - 32 * scale, y: y - 108 * scale, w: 64 * scale, h: 42 * scale },
        { part: "belly", label: "腹部", damage: 10, x: x - 28 * scale, y: y - 66 * scale, w: 56 * scale, h: 34 * scale },
        { part: "limb", label: "手脚", damage: 5, x: x - 54 * scale, y: y - 94 * scale, w: 108 * scale, h: 112 * scale }
      ];
    }

    function nameOf(f) {
      return f.kind === "assassin" ? "刺客" : "骑士";
    }

    function burst(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = 80 + Math.random() * 180;
        game.particles.push({
          x, y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s - 40,
          life: .35 + Math.random() * .35,
          color
        });
      }
    }

    function updateHud() {
      const p = Math.round(game.player.hp);
      const e = Math.round(game.enemy.hp);
      els.playerHp.style.width = `${p}%`;
      els.enemyHp.style.width = `${e}%`;
      els.playerHpText.textContent = `${p}%`;
      els.enemyHpText.textContent = `${e}%`;
      els.roundLabel.textContent = `第 ${game.round} 局`;
      els.playerWins.forEach((dot, i) => dot.classList.toggle("on", i < game.playerScore));
      els.enemyWins.forEach((dot, i) => dot.classList.toggle("on", i < game.enemyScore));
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawArena();
      const fighters = [game.player, game.enemy].sort((a, b) => a.y - b.y);
      fighters.forEach(drawFighter);
      drawParticles();
      if (game.toastTimer > 0) drawToast();
    }

    function drawArena() {
      const cx = W / 2;
      const cy = H * .66;
      ctx.fillStyle = "#151820";
      ctx.fillRect(0, 0, W, H);

      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, "#222839");
      sky.addColorStop(.48, "#171b22");
      sky.addColorStop(1, "#111318");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "#242024";
      ctx.fillRect(0, H * .36, W, H * .08);
      for (let i = 0; i < 11; i++) {
        ctx.fillStyle = i % 2 ? "#3a2b2a" : "#4a3430";
        ctx.fillRect(i * W / 11, H * .33 + (i % 3) * 5, W / 11 - 3, H * .09);
      }

      ctx.fillStyle = "#6b5243";
      ctx.fillRect(0, H * .42, W, 20);
      ctx.fillStyle = "#8f704f";
      ctx.fillRect(0, H * .44, W, 8);

      const floor = ctx.createRadialGradient(cx, cy, 20, cx, cy, Math.max(W, H) * .58);
      floor.addColorStop(0, "#947552");
      floor.addColorStop(.62, "#604b39");
      floor.addColorStop(1, "#2a2522");
      ctx.fillStyle = floor;
      ctx.beginPath();
      ctx.ellipse(cx, cy, W * .43, H * .25, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,.18)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.ellipse(cx, cy, W * .43, H * .25, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.strokeStyle = "rgba(20,16,12,.28)";
      ctx.lineWidth = 1;
      for (let i = 0; i < 10; i++) {
        const yy = H * .5 + i * H * .035;
        ctx.beginPath();
        ctx.ellipse(cx, yy, W * (.12 + i * .035), 7, 0, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function scaleOf() {
      return clamp(Math.min(W / 820, H / 390), .72, 1.14);
    }

    function drawFighter(f) {
      const s = scaleOf();
      const x = f.x;
      const y = f.y;
      const flip = f.dir;
      const bob = Math.sin(f.step * 2) * 3;
      const hurtShift = f.hurt > 0 ? (Math.random() - .5) * 6 : 0;
      ctx.save();
      ctx.translate(x + hurtShift, y + bob);
      ctx.scale(flip * s, s);

      ctx.fillStyle = "rgba(0,0,0,.28)";
      ctx.beginPath();
      ctx.ellipse(0, 4, 54, 14, 0, 0, Math.PI * 2);
      ctx.fill();

      if (f.kind === "assassin") drawAssassin(f);
      else drawKnight(f);

      if (f.attack > 0) drawSwordArc(f);
      ctx.restore();
    }

    function drawAssassin(f) {
      const cape = f.attack > 0 ? -12 : -4;
      ctx.fillStyle = "#23242d";
      ctx.beginPath();
      ctx.moveTo(-28, -108);
      ctx.quadraticCurveTo(-82, -68, -46 + cape, -10);
      ctx.lineTo(14, -24);
      ctx.quadraticCurveTo(22, -86, -28, -108);
      ctx.fill();

      ctx.fillStyle = "#3a3d49";
      roundRect(-31, -108, 62, 78, 18);
      ctx.fill();
      ctx.fillStyle = "#7d493f";
      roundRect(-24, -68, 48, 30, 12);
      ctx.fill();

      ctx.fillStyle = "#efe0c8";
      ctx.beginPath();
      ctx.arc(0, -137, 30, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#20242d";
      ctx.beginPath();
      ctx.moveTo(-34, -148);
      ctx.quadraticCurveTo(0, -190, 35, -148);
      ctx.lineTo(26, -128);
      ctx.quadraticCurveTo(0, -141, -28, -128);
      ctx.fill();
      ctx.fillStyle = "#111318";
      ctx.beginPath();
      ctx.arc(10, -137, 4, 0, Math.PI * 2);
      ctx.arc(-10, -137, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#111318";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-12, -126);
      ctx.quadraticCurveTo(0, -119, 13, -126);
      ctx.stroke();

      drawLimb(-25, -83, -54, -43, "#3a3d49", 12);
      drawLimb(25, -82, 48, -52, "#3a3d49", 12);
      drawLimb(-15, -33, -32, 0, "#292b34", 13);
      drawLimb(17, -33, 35, 0, "#292b34", 13);
      drawSmallBlade(48, -52, 1);
    }

    function drawKnight(f) {
      ctx.fillStyle = "#d7dde5";
      roundRect(-34, -110, 68, 82, 18);
      ctx.fill();
      ctx.fillStyle = "#7593ba";
      roundRect(-25, -96, 50, 50, 14);
      ctx.fill();
      ctx.fillStyle = "#d8c073";
      roundRect(-16, -86, 32, 20, 8);
      ctx.fill();

      ctx.fillStyle = "#e8edf2";
      ctx.beginPath();
      ctx.arc(0, -139, 32, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#6f7d8e";
      ctx.fillRect(-26, -144, 52, 10);
      ctx.fillStyle = "#15171b";
      ctx.fillRect(-16, -144, 32, 4);
      ctx.fillStyle = "#efe0c8";
      ctx.beginPath();
      ctx.arc(0, -130, 12, 0, Math.PI);
      ctx.fill();

      drawLimb(-27, -84, -58, -48, "#bfc8d2", 13);
      drawLimb(28, -83, 50, -52, "#bfc8d2", 13);
      drawLimb(-16, -33, -34, 0, "#9caabc", 14);
      drawLimb(18, -33, 38, 0, "#9caabc", 14);
      drawSmallBlade(52, -52, 1.18);
    }

    function drawLimb(x1, y1, x2, y2, color, width) {
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    function drawSmallBlade(x, y, size) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(-.42);
      ctx.fillStyle = "#dfe7f0";
      ctx.beginPath();
      ctx.moveTo(0, -5 * size);
      ctx.lineTo(62 * size, -1 * size);
      ctx.lineTo(0, 5 * size);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#7a523f";
      ctx.fillRect(-10 * size, -4 * size, 16 * size, 8 * size);
      ctx.restore();
    }

    function drawSwordArc(f) {
      const t = 1 - f.attack / .28;
      ctx.strokeStyle = "rgba(247,242,232,.72)";
      ctx.lineWidth = 8;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.arc(46, -88, 70, -1.1 + t * .8, -.2 + t * .9);
      ctx.stroke();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawParticles() {
      for (const p of game.particles) {
        ctx.globalAlpha = clamp(p.life * 2.5, 0, 1);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawToast() {
      ctx.save();
      ctx.globalAlpha = clamp(game.toastTimer, 0, 1);
      ctx.font = `900 ${Math.max(18, Math.min(28, W * .026))}px system-ui, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const text = game.toast;
      const width = ctx.measureText(text).width + 42;
      const x = W / 2 - width / 2;
      const y = H * .22;
      ctx.fillStyle = "rgba(16,18,22,.72)";
      roundRect(x, y, width, 48, 8);
      ctx.fill();
      ctx.fillStyle = "#f7f2e8";
      ctx.fillText(text, W / 2, y + 24);
      ctx.restore();
    }

    function loop(time) {
      const dt = Math.min(.033, (time - lastTime) / 1000 || .016);
      lastTime = time;
      update(dt);
      requestAnimationFrame(loop);
    }

    function stickCenter() {
      const rect = els.stick.getBoundingClientRect();
      return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2, r: rect.width * .36 };
    }

    function moveStick(clientX, clientY) {
      const c = stickCenter();
      const dx = clientX - c.x;
      const dy = clientY - c.y;
      const len = Math.hypot(dx, dy);
      const n = len > c.r ? c.r / len : 1;
      const x = dx * n;
      const y = dy * n;
      input.x = x / c.r;
      input.y = y / c.r;
      els.knob.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
    }

    function resetStick() {
      input.x = 0;
      input.y = 0;
      stickPointer = null;
      els.knob.style.transform = "translate(-50%, -50%)";
    }

    els.stick.addEventListener("pointerdown", event => {
      stickPointer = event.pointerId;
      els.stick.setPointerCapture(event.pointerId);
      moveStick(event.clientX, event.clientY);
    });

    els.stick.addEventListener("pointermove", event => {
      if (event.pointerId === stickPointer) moveStick(event.clientX, event.clientY);
    });

    els.stick.addEventListener("pointerup", resetStick);
    els.stick.addEventListener("pointercancel", resetStick);

    els.attackBtn.addEventListener("pointerdown", event => {
      event.preventDefault();
      els.attackBtn.classList.add("pressed");
      startAttack(game.player);
    });

    els.attackBtn.addEventListener("pointerup", () => els.attackBtn.classList.remove("pressed"));
    els.attackBtn.addEventListener("pointercancel", () => els.attackBtn.classList.remove("pressed"));

    window.addEventListener("keydown", event => {
      if (event.key === " " || event.key.toLowerCase() === "j") startAttack(game.player);
      if (event.key === "a" || event.key === "ArrowLeft") input.x = -1;
      if (event.key === "d" || event.key === "ArrowRight") input.x = 1;
      if (event.key === "w" || event.key === "ArrowUp") input.y = -1;
      if (event.key === "s" || event.key === "ArrowDown") input.y = 1;
    });

    window.addEventListener("keyup", event => {
      if (["a", "d", "ArrowLeft", "ArrowRight"].includes(event.key)) input.x = 0;
      if (["w", "s", "ArrowUp", "ArrowDown"].includes(event.key)) input.y = 0;
    });

    els.startBtn.addEventListener("click", startMatch);
    window.addEventListener("resize", resize);
    window.addEventListener("orientationchange", () => window.setTimeout(resize, 160));

    resize();
    game = makeGame();
    updateHud();
    if (new URLSearchParams(window.location.search).get("autostart") === "1") {
      startMatch();
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
